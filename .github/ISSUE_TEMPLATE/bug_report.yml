name: Bug report
title: "[BUG] "
description: Сообщите о возникшей проблеме

body:
  - type: markdown
    attributes:
      value: |
        ## Прежде чем создать проблему, пожалуйста, убедитесь, что:
        1. Вы указали четкий и краткий заголовок проблемы, чтобы другие могли быстро её найти.
        2. Вы проверили, что похожей проблемы нет среди [существующих](https://github.com/grandvan709/yookassa-to-mynalog/issues?q=is%3Aissue), в противном случае, обсуждайте её там.
        3. Вы подробно описали проблему, следуя требованиям шаблона, иначе проблема будет закрыта без рассмотрения.
  - type: textarea
    id: description
    attributes:
      label: Описание проблемы
      description: Подробно и ясно опишите возникшую у вас проблему, при возможности приложите скриншоты
    validations:
      required: true
  - type: input
    attributes:
      label: Версия образа
      description: Тег Docker-образа (например 2.4.3 или latest)
      placeholder: "2.4.3"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Как воспроизвести
      description: Опишите шаги для воспроизведения ошибки
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Операционная система хоста
      options:
        - Debian 12
        - Debian 13
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Other Linux
    validations:
      required: true
  - type: input
    attributes:
      label: Версия Docker
      description: "Результат команды: docker -v"
      placeholder: "Docker version 29.3.0"
    validations:
      required: false
  - type: textarea
    attributes:
      label: Логи
      description: "Вставьте логи из команды: docker compose logs -ft"
      render: shell
    validations:
      required: true
  - type: textarea
    attributes:
      label: Содержимое .env (без секретов)
      description: Вставьте ваш .env, заменив токены/пароли на ***
      render: shell
    validations:
      required: false
